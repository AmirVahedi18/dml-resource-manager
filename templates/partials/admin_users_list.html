{% include "partials/_home_button.html" %}
<div class="card">
  <p><strong>Manage Users</strong> (✅ active, 🚫 inactive, ⭐ privileged)</p>
  {% for u in users %}
  <div class="card">
    <p>
      {{ u.full_name }} {{ "✅" if u.is_active else "🚫" }}{{ " ⭐" if u.can_use_multiple_gpus else "" }}<br>
      <span class="muted">Telegram ID: {{ u.telegram_id }}</span>
    </p>
    <form hx-post="/api/admin/users/{{ u.id }}/toggle-active" hx-target="#content">
      <button type="submit">{{ "🚫 Deactivate" if u.is_active else "✅ Activate" }}</button>
    </form>
    <form hx-post="/api/admin/users/{{ u.id }}/toggle-privilege" hx-target="#content">
      <button type="submit">{{ "⭐ Revoke multi-GPU" if u.can_use_multiple_gpus else "⭐ Grant multi-GPU" }}</button>
    </form>
  </div>
  {% endfor %}
  <a class="btn" hx-get="/api/admin/users/new" hx-target="#content">➕ Add User</a>
</div>
