{% include "partials/_home_button.html" %}
<div class="card">
  <p><strong>My Reservations</strong></p>
  {% if not reservations %}
  <p class="muted">You have no upcoming reservations.</p>
  {% endif %}
  {% for r in reservations %}
  <a class="btn" hx-get="/api/reservations/{{ r.id }}" hx-target="#content">
    {{ r.gpu.server.name }} GPU{{ r.gpu.index_on_server }} · {{ r.start_label }}
  </a>
  {% endfor %}
</div>
