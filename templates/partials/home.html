{% if viewer.is_admin %}
<div class="card">
  <p><strong>🛠 Admin</strong></p>
  <a class="btn" hx-get="/api/admin/users" hx-target="#content">👤 Manage Users</a>
  <a class="btn" hx-get="/api/admin/servers" hx-target="#content">🖥 Manage Servers</a>
  <a class="btn" hx-get="/api/admin/regulation" hx-target="#content">⚖️ Regulation</a>
  <a class="btn" hx-get="/api/admin/usage" hx-target="#content">📊 Usage Report</a>
  <a class="btn" hx-get="/api/admin/reservations" hx-target="#content">📋 All Reservations</a>
</div>
{% endif %}

{% if viewer.db_user %}
<div class="card">
  <p><strong>Welcome, {{ viewer.db_user.full_name }}</strong></p>
  <a class="btn" hx-get="/api/reserve" hx-target="#content">📅 Reserve GPU</a>
  <a class="btn" hx-get="/api/reservations" hx-target="#content">🗂 My Reservations</a>
  <a class="btn" hx-get="/api/schedule" hx-target="#content">📊 View Schedule</a>
  <a class="btn" hx-get="/api/watches" hx-target="#content">🔔 My Watches</a>
</div>
{% endif %}
