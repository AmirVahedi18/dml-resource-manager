{% include "partials/_home_button.html" %}
<div class="card">
  <p><strong>{{ server.name }} GPU{{ gpu.index_on_server }} — choose a date</strong></p>
  {% for day in days %}
  <a class="btn" hx-get="/api/reserve/{{ server.id }}/{{ gpu.id }}/{{ day.isoformat() }}" hx-target="#content">
    {{ day.strftime("%a %d %b") }}
  </a>
  {% endfor %}
</div>
