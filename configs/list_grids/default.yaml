# Reply-keyboard interface: per-screen button-grid dimensions for paginated list screens.
# page_size = columns * rows for that screen; columns: 1 is a plain one-button-per-row list.
# Screens not listed here (GPU list, reservation list, watch list) always use the one-column
# layout and aren't affected by this file.
start_time:
  columns: 4
  rows: 6

date:
  columns: 4
  rows: 6

user_list:
  columns: 2
  rows: 6

server_list:
  columns: 2
  rows: 6

admin_menu:
  columns: 3
  rows: 2
