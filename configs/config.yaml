defaults:
  - base_config
  - bot: default
  - database: default
  - logging: default
  - regulation: default
  - scheduler: default
  - webapp: default
  - schedule_chart: default
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

interface: reply_keyboard  # "webapp", "legacy" (classic inline menu), or "reply_keyboard"

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .
