services:
  # FastAPI backend + React SPA (dml-api + dml-web below). Run with `docker compose up -d --build`.
  dml-api:
    build: .
    container_name: dml-resource-manager-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    expose:
      - "8000"

  dml-web:
    build: ./web/frontend
    container_name: dml-resource-manager-web
    restart: unless-stopped
    depends_on:
      - dml-api
    ports:
      # Host port the web UI is reachable on -- remap the left side (e.g. "80:80") if the host
      # can bind privileged ports and you want it on the default HTTP port.
      - "8080:80"
