server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin from the browser's perspective, so the SPA never needs CORS config or a
    # build-time API base URL -- it always calls relative /api/... paths.
    location /api/ {
        proxy_pass http://dml-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side routing: any path that isn't a static asset falls back to index.html so
    # React Router can handle it (e.g. a hard refresh on /admin/users).
    location / {
        try_files $uri /index.html;
    }
}
